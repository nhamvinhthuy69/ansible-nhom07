---
- name: "PLAY 1 | BIND9 DNS"
  hosts: dns_servers
  become: yes
  vars:
    web_dns_target_ip: "{{ haproxy_ip }}"
  roles:
    - dns
  tags: [dns]

- name: "PLAY 2 | DNS Client"
  hosts: all
  become: yes
  roles:
    - dns_client
  tags: [dns]

- name: "PLAY 3 | NFS Server"
  hosts: nfs_servers
  become: yes
  roles:
    - nfs_server
  tags: [nfs]

- name: "PLAY 4 | MariaDB"
  hosts: db_servers
  become: yes
  roles:
    - mariadb
  tags: [db]

- name: "PLAY 5 | Web Servers"
  hosts: web_servers
  become: yes
  roles:
    - nfs_client
    - webserver
    - wordpress
  tags: [web, wordpress]

- name: "PLAY 6 | SSL Certificate + HAProxy"
  hosts: lb_servers
  become: yes
  roles:
    - ssl
    - haproxy
  tags: [ssl, haproxy, lb]

- name: "PLAY 7 | Backup"
  hosts: nfs_servers:db_servers
  become: yes
  roles:
    - backup
  tags: [backup]
